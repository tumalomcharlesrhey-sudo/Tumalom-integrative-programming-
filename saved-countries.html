<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Countries — Tumalom</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">Charles Rhey B. Tumalom</div>
      <nav>
        <ul id="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="settings.html">Settings</a></li>
          <li><a href="country-info.html">Country Info</a></li>
          <li>
            <a href="saved-countries.html" class="active">Saved Countries</a>
          </li>
        </ul>
        <div id="menu-toggle" class="menu-icon">☰</div>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-content">
        <h1>Saved Countries</h1>
        <p>
          Your collection of saved countries with their population, weather, and
          currency information around the world.
        </p>
      </div>
    </section>

    <section class="saved-section">
      <div class="saved-container">
        <div id="saved-list" class="saved-grid">
          <!-- Saved countries will be loaded here by JavaScript -->
        </div>
      </div>
    </section>

    <style>
      .saved-section {
        background: #ffffff;
        padding: 60px 20px;
        min-height: 60vh;
      }

      .saved-container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .saved-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 25px;
        margin-top: 30px;
      }

      .saved-card {
        background: #f9f9f9;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .saved-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
      }

      .saved-card-flag {
        width: 100%;
        height: 140px;
        object-fit: cover;
      }

      .saved-card-content {
        padding: 18px;
      }

      .saved-card-content h3 {
        margin: 0 0 12px 0;
        color: #222;
        font-size: 20px;
      }

      .saved-card-content p {
        margin: 6px 0;
        color: #666;
        font-size: 14px;
      }

      .saved-info-label {
        font-weight: bold;
        color: #333;
      }

      .saved-card-actions {
        display: flex;
        gap: 10px;
        margin-top: 15px;
        padding-top: 12px;
        border-top: 1px solid #eee;
      }

      .btn-delete {
        flex: 1;
        padding: 10px;
        background: #ff4444;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.3s ease;
      }

      .btn-delete:hover {
        background: #cc0000;
      }

      .btn-save {
        flex: 1;
        padding: 12px 20px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.3s ease;
      }

      .btn-save:hover {
        background: #45a049;
      }

      .btn-view-saved {
        flex: 1;
        padding: 12px 20px;
        background: #2196f3;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        font-weight: bold;
        transition: background 0.3s ease;
      }

      .btn-view-saved:hover {
        background: #0b7dda;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #999;
      }

      .empty-state h2 {
        color: #666;
        margin-bottom: 15px;
      }

      .empty-state p {
        color: #888;
        margin-bottom: 25px;
      }

      .btn-explore {
        display: inline-block;
        padding: 12px 25px;
        background: #b58953;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
        transition: background 0.3s ease;
      }

      .btn-explore:hover {
        background: #9d6f43;
      }

      .saved-timestamp {
        font-size: 12px;
        color: #999;
        margin-top: 8px;
      }

      .clear-all-btn {
        padding: 10px 20px;
        background: #f44336;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        margin: 20px auto;
        display: block;
        transition: background 0.3s ease;
      }

      .clear-all-btn:hover {
        background: #da190b;
      }

      .success-banner {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 12px 20px;
        border-radius: 4px;
        color: white;
        font-weight: bold;
        z-index: 1000;
        animation: slideIn 0.3s ease;
      }

      .success-banner.message-success {
        background-color: #4caf50;
      }

      .success-banner.message-warning {
        background-color: #ff9800;
      }

      @keyframes slideIn {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slideOut {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(400px);
          opacity: 0;
        }
      }

      .country-actions {
        display: flex;
        gap: 10px;
        margin-top: 15px;
        padding-top: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .country-actions .btn-save {
        flex: 1;
        padding: 10px 15px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.3s ease;
      }

      .country-actions .btn-save:hover {
        background: #45a049;
      }

      .country-actions .btn-view-saved {
        flex: 1;
        padding: 10px 15px;
        background: #2196f3;
        color: white;
        text-decoration: none;
        text-align: center;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.3s ease;
      }

      .country-actions .btn-view-saved:hover {
        background: #0b7dda;
      }

      @media (max-width: 768px) {
        .saved-grid {
          grid-template-columns: 1fr;
        }

        .hero h1 {
          font-size: 36px;
        }
      }
    </style>

    <script src="script.js"></script>
  </body>
</html>
